name: Release

on:
  push:
    branches:
      - main
      - release-workflow-test
    paths:
      - 'packages/lib/**'
      - 'packages/tool/**'
      - 'packages/types/**'
      - 'package.json'
      - 'yarn.lock'
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            lib:
              - 'packages/lib/**'
            tool:
              - 'packages/tool/**'
            types:
              - 'packages/types/**'

  build-types:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enable Corepack
        run: corepack enable
      - name: Setup Yarn
        run: corepack prepare yarn@4.8.1 --activate
      - name: Install dependencies
        run: yarn install
      - name: Build types
        run: cd packages/types && yarn build
      - name: Upload types build
        uses: actions/upload-artifact@v4
        with:
          name: types-build
          path: packages/types/dist

  build-lib:
    needs: build-types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enable Corepack
        run: corepack enable
      - name: Setup Yarn
        run: corepack prepare yarn@4.8.1 --activate
      - name: Install dependencies
        run: yarn install
      - name: Download types build
        uses: actions/download-artifact@v4
        with:
          name: types-build
          path: packages/types/dist
      - name: Build lib
        run: cd packages/lib && yarn prepare
      - name: Release lib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd packages/lib && yarn release

  build-tool:
    needs: build-types
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enable Corepack
        run: corepack enable
      - name: Setup Yarn
        run: corepack prepare yarn@4.8.1 --activate
      - name: Install dependencies
        run: yarn install
      - name: Download types build
        uses: actions/download-artifact@v4
        with:
          name: types-build
          path: packages/types/dist
      - name: Build tool
        run: yarn workspace @react-native-pulse-debugger/tool build
      - name: Upload tool build
        uses: actions/upload-artifact@v4
        with:
          name: tool-build
          path: |
            packages/tool/release/*.dmg
            packages/tool/release/*.exe
            packages/tool/release/*.zip
